title: Documentation
description: A GitHub Pages documentation site
theme: just-the-docs

url: https://arnabnandy1706.github.io
baseurl: /documentation

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links (top right navigation)
aux_links:
  "View on GitHub":
    - "https://github.com/arnabnandy1706/documentation"

aux_links_new_tab: true

# Footer
footer_content: "Copyright &copy; 2024. Distributed under the <a href=\"https://github.com/arnabnandy1706/documentation/blob/main/LICENSE\">MIT License.</a>"

# Color scheme
color_scheme: light

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
